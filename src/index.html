<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>noted</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <div id="window">
      <div id="titlebar" data-tauri-drag-region>
        <div id="titlebar-grip"></div>
        <button id="btn-settings" title="Settings" aria-label="Settings">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <line x1="2" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="2" y1="12" x2="14" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
        <div id="window-controls">
          <button id="btn-minimize" title="Minimize">
            <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" rx="0.5" fill="currentColor"/></svg>
          </button>
          <button id="btn-maximize" title="Maximize">
            <svg width="9" height="9" viewBox="0 0 9 9"><rect x="0.5" y="0.5" width="8" height="8" rx="1.5" fill="none" stroke="currentColor" stroke-width="1"/></svg>
          </button>
          <button id="btn-close" title="Close">
            <svg width="9" height="9" viewBox="0 0 9 9"><path d="M1 1L8 8M8 1L1 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <div id="canvas-container">
        <textarea id="note-canvas" placeholder="Start typing..." spellcheck="false"></textarea>
      </div>
      <div id="note-indicator"></div>
      <aside id="settings-panel" class="hidden" aria-hidden="true">
        <div class="settings-scroll">
          <div class="settings-header">
            <h2>Settings</h2>
          </div>
          <div class="settings-section">
            <div class="settings-section-row">
              <h3 class="settings-section-title">Theme</h3>
              <div class="theme-dropdown" id="theme-dropdown">
                <button class="theme-dropdown-trigger" id="theme-dropdown-trigger" aria-haspopup="listbox" aria-expanded="false">
                  <span id="theme-dropdown-label"></span>
                  <svg class="theme-dropdown-chevron" width="10" height="6" viewBox="0 0 10 6" fill="none" aria-hidden="true">
                    <path d="M1 1.5L5 5.5L9 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </button>
                <div class="theme-dropdown-panel" id="theme-dropdown-panel" role="listbox" hidden></div>
              </div>
            </div>
            <div class="theme-actions">
              <a class="theme-browse-link" href="https://github.com/johnsonfung/antinote-extensions/tree/main" target="_blank" rel="noopener">Browse themes</a>
              <button id="btn-import-theme">Import Theme</button>
            </div>
            <input id="theme-file-input" type="file" accept=".json,application/json"hidden />
          </div>
        </div>
        <div class="settings-update-row" id="update-row">
          <button class="settings-update-btn" id="update-btn">Check for Updates</button>
          <span class="settings-update-version" id="update-version">v0.1.1</span>
        </div>
      </aside>
    </div>
  </body>
</html>
