name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    name: Linux (.deb, .AppImage, .rpm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libssl-dev libgtk-3-dev libayatana-appindicator3-dev \
            librsvg2-dev libfuse2 patchelf

      - run: npm install

      - name: Build
        run: npx tauri build

      - name: Upload deb
        uses: actions/upload-artifact@v4
        with:
          name: deb
          path: src-tauri/target/release/bundle/deb/*.deb

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload rpm
        uses: actions/upload-artifact@v4
        with:
          name: rpm
          path: src-tauri/target/release/bundle/rpm/*.rpm

  build-windows:
    name: Windows (.msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - run: npm install

      - name: Build
        run: npx tauri build

      - name: Upload msi
        uses: actions/upload-artifact@v4
        with:
          name: msi
          path: src-tauri/target/release/bundle/msi/*.msi

  release:
    name: Attach to Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - uses: actions/download-artifact@v4

      - name: Generate signatures and update manifest
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          LINUX_SIG=""
          WIN_SIG=""
          DEB_BASENAME=""
          MSI_BASENAME=""

          # Discover actual artifact filenames (they use the Cargo.toml version,
          # which may differ from the git tag if someone forgot to bump).
          DEB_FILE=$(find deb -name '*.deb' 2>/dev/null | head -1)
          MSI_FILE=$(find msi -name '*.msi' 2>/dev/null | head -1)

          if [ -n "$DEB_FILE" ]; then
            DEB_BASENAME=$(basename "$DEB_FILE")
          fi
          if [ -n "$MSI_FILE" ]; then
            MSI_BASENAME=$(basename "$MSI_FILE")
          fi

          if [ -n "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            if [ -n "$DEB_FILE" ]; then
              LINUX_SIG=$(npx tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" -p "" "$DEB_FILE" 2>&1 | grep -A1 "Public signature:" | tail -1)
            fi

            if [ -n "$MSI_FILE" ]; then
              WIN_SIG=$(npx tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" -p "" "$MSI_FILE" 2>&1 | grep -A1 "Public signature:" | tail -1)
            fi
          fi

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "See the release notes for details.",
            "pub_date": "${DATE}",
            "platforms": {
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "https://github.com/khurrambhutto/noted/releases/download/${TAG}/${DEB_BASENAME}"
              },
              "windows-x86_64": {
                "signature": "${WIN_SIG}",
                "url": "https://github.com/khurrambhutto/noted/releases/download/${TAG}/${MSI_BASENAME}"
              }
            }
          }
          EOF
          echo "Generated latest.json:"
          cat latest.json

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            deb/*.deb
            appimage/*.AppImage
            rpm/*.rpm
            msi/*.msi
            latest.json
          generate_release_notes: true

      - name: Commit latest.json back to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          cp latest.json /tmp/latest.json
          git fetch origin main
          git checkout main
          cp /tmp/latest.json latest.json
          git add latest.json
          git commit -m "Update latest.json for ${GITHUB_REF_NAME}" || echo "No changes to commit"
          git push
